version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: nexusdesk_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexusdesk_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  pgdata:
